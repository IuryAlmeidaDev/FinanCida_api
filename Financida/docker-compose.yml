services:
  db:
    image: postgres:16-alpine
    container_name: financida-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: financida
      POSTGRES_USER: financida
      POSTGRES_PASSWORD: financida_password
    ports:
      - "5432:5432"
    volumes:
      - financida-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financida -d financida"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financida-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://financida:financida_password@db:5432/financida
      AUTH_JWT_SECRET: financida-session-secret
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  financida-postgres-data:
